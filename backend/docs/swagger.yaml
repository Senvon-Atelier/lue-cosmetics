basePath: /api/v1
definitions:
  github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorBody:
    properties:
      code:
        type: string
      fields:
        additionalProperties:
          type: string
        type: object
      message:
        type: string
    type: object
  github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope:
    properties:
      error:
        $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorBody'
    type: object
  internal_auth.loginBody:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  internal_auth.prConfBody:
    properties:
      new_password:
        type: string
      token:
        type: string
    type: object
  internal_auth.prReqBody:
    properties:
      email:
        type: string
    type: object
  internal_auth.sessionResponse:
    properties:
      email:
        type: string
      email_verified:
        type: boolean
      name:
        type: string
      role:
        type: string
      user_id:
        type: string
    type: object
  internal_auth.signupBody:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  internal_auth.verifyEmailBody:
    properties:
      token:
        type: string
    type: object
  internal_cart.cartItemResponse:
    properties:
      id:
        type: string
      line_total_ghs_minor:
        type: integer
      product_id:
        type: string
      product_image_path:
        type: string
      product_name:
        type: string
      product_slug:
        type: string
      qty:
        type: integer
      unit_price_ghs_minor:
        type: integer
    type: object
  internal_cart.cartResponse:
    properties:
      cart_id:
        type: string
      free_shipping_remainder_ghs_minor:
        type: integer
      guest_token:
        type: string
      items:
        items:
          $ref: '#/definitions/internal_cart.cartItemResponse'
        type: array
      shipping_cost_ghs_minor:
        type: integer
      subtotal_ghs_minor:
        type: integer
      total_ghs_minor:
        type: integer
    type: object
  internal_cart.mergeRequestBody:
    properties:
      guest_token:
        type: string
    type: object
  internal_cart.patchItemBody:
    properties:
      qty:
        type: integer
    type: object
  internal_cart.postItemBody:
    properties:
      product_id:
        type: string
      qty:
        type: integer
    type: object
  internal_catalog.ProductView:
    properties:
      brand_id:
        type: string
      category_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      image_path:
        type: string
      name:
        type: string
      price_ghs_minor:
        type: integer
      rating:
        type: number
      review_count:
        type: integer
      size:
        type: string
      slug:
        type: string
      tags:
        items:
          type: string
        type: array
      tone:
        type: string
      was_price_ghs_minor:
        type: integer
    type: object
  internal_catalog.brandView:
    properties:
      id:
        type: string
      name:
        type: string
      slug:
        type: string
    type: object
  internal_catalog.categoryView:
    properties:
      id:
        type: string
      label:
        type: string
      slug:
        type: string
      sort_order:
        type: integer
    type: object
  internal_catalog.productsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_catalog.ProductView'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  internal_health.response:
    properties:
      db:
        type: string
      status:
        type: string
    type: object
  internal_me.meResponse:
    properties:
      email:
        type: string
      email_verified:
        type: boolean
      name:
        type: string
      role:
        type: string
      user_id:
        type: string
    type: object
  internal_shipping.Quote:
    properties:
      applied_cost_ghs_minor:
        type: integer
      flat_rate_ghs_minor:
        type: integer
      free_over_ghs_minor:
        type: integer
      free_shipping_remainder_ghs_minor:
        type: integer
    type: object
info:
  contact: {}
  description: E-commerce backend for the Rue Cosmetics case study.
  title: Rue Cosmetics API
  version: 0.1.0
paths:
  /auth/google/callback:
    get:
      responses:
        "302":
          description: Found
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: Handle Google OAuth callback
      tags:
      - auth
  /auth/google/start:
    get:
      responses:
        "302":
          description: redirect to Google
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: Begin Google OAuth login
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.loginBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.sessionResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: Log in with email and password
      tags:
      - auth
  /auth/logout:
    post:
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      summary: Log out (clear session)
      tags:
      - auth
  /auth/password-reset/confirm:
    post:
      consumes:
      - application/json
      parameters:
      - description: Token + new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.prConfBody'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: Confirm password reset with token
      tags:
      - auth
  /auth/password-reset/request:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.prReqBody'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      summary: Request a password-reset email
      tags:
      - auth
  /auth/session:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.sessionResponse'
        "204":
          description: no active session
      summary: Get current session
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      parameters:
      - description: Signup payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.signupBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_auth.sessionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: Sign up with email and password
      tags:
      - auth
  /auth/verify-email:
    post:
      consumes:
      - application/json
      parameters:
      - description: Token payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.verifyEmailBody'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: Verify email by token
      tags:
      - auth
  /auth/verify-email/resend:
    post:
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: Resend verification email
      tags:
      - auth
  /brands:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_catalog.brandView'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: List brands
      tags:
      - catalog
  /cart:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_cart.cartResponse'
      summary: Get the caller's cart (mints a guest cart on first call)
      tags:
      - cart
  /cart/items:
    post:
      consumes:
      - application/json
      parameters:
      - description: Item payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_cart.postItemBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_cart.cartResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: 'Add an item to the cart (upserts: qty is summed on conflict)'
      tags:
      - cart
  /cart/items/{id}:
    delete:
      parameters:
      - description: Cart item id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: Remove an item from the cart
      tags:
      - cart
    patch:
      consumes:
      - application/json
      parameters:
      - description: Cart item id
        in: path
        name: id
        required: true
        type: string
      - description: Qty payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_cart.patchItemBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_cart.cartResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: Update an item's qty
      tags:
      - cart
  /cart/merge:
    post:
      consumes:
      - application/json
      parameters:
      - description: Guest token from localStorage
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_cart.mergeRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_cart.cartResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: Merge a guest cart into the user's cart (auth required)
      tags:
      - cart
  /categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_catalog.categoryView'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: List categories
      tags:
      - catalog
  /healthz:
    get:
      description: Verifies the service is up and the database is reachable.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_health.response'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: Health check
      tags:
      - meta
  /me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_me.meResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: Get the current user
      tags:
      - me
  /products:
    get:
      parameters:
      - description: Category slug
        in: query
        name: category
        type: string
      - description: Brand slug
        in: query
        name: brand
        type: string
      - description: Tag
        in: query
        name: tag
        type: string
      - description: Search query against name
        in: query
        name: q
        type: string
      - description: newest|price_asc|price_desc|rating_desc|name_asc
        in: query
        name: sort
        type: string
      - description: Page (1-based)
        in: query
        name: page
        type: integer
      - description: Page size (default 24, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_catalog.productsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: List products
      tags:
      - catalog
  /products/{slug}:
    get:
      parameters:
      - description: Slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_catalog.ProductView'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: Get product by slug
      tags:
      - catalog
  /shipping/quote:
    get:
      parameters:
      - description: Cart subtotal in pesewas (>= 0)
        in: query
        name: subtotal
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_shipping.Quote'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_oti-adjei_ruecosmetics_internal_httpx.ErrorEnvelope'
      summary: Get shipping quote
      tags:
      - shipping
swagger: "2.0"
